name: Codex Autofix PR Request

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: read
  actions: read

jobs:
  open-autofix-pr:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write Codex autofix request
        id: request
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            const pr = prs[0];
            if (!pr) {
              core.info("No pull request associated with failed run.");
              return;
            }

            const fs = require("fs");
            const path = ".codex/autofix-requests";
            fs.mkdirSync(path, { recursive: true });

            const body = [
              `# Codex autofix request for PR #${pr.number}`,
              "",
              "CI failed for the linked pull request.",
              "",
              "## Requested action",
              "- Inspect failed checks.",
              "- Prepare fixes only for the failing PR scope.",
              "- Open or update a PR instead of pushing directly to main.",
              "- Keep product safety rules from AGENTS.md.",
              "",
              `Failed run: ${run.html_url}`,
              `Source PR: ${pr.url}`
            ].join("\n");

            fs.writeFileSync(`${path}/pr-${pr.number}.md`, body);

            core.setOutput("pr_number", String(pr.number));

      - name: Open Codex autofix request PR
        if: steps.request.outputs.pr_number != ''
        uses: peter-evans/create-pull-request@v6
        with:
          branch: codex/autofix-request-pr-${{ steps.request.outputs.pr_number }}
          title: Codex autofix request for PR #${{ steps.request.outputs.pr_number }}
          body: |
            CI failed for PR #${{ steps.request.outputs.pr_number }}.

            This PR records a Codex autofix request and must not bypass human review.
            Apply fixes only in the original failing PR scope.
          commit-message: Add Codex autofix request for PR #${{ steps.request.outputs.pr_number }}
          labels: codex-autofix
