name: Codex Autofix Request

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  open-autofix-issue:
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Create follow-up issue for failed PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests || [];
            const pr = prs[0];
            if (!pr) {
              core.info("No pull request associated with failed run.");
              return;
            }

            const title = `Codex autofix needed for PR #${pr.number}`;
            const body = [
              `CI failed for PR #${pr.number}.`,
              "",
              "Requested action:",
              "- Inspect failed checks.",
              "- Prepare a fix branch or PR only for the failing PR scope.",
              "- Keep product safety rules from AGENTS.md.",
              "",
              `Failed run: ${run.html_url}`
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["codex-autofix"]
            });
